name: english-textbook
version: "0.2"
description: Source-faithful English textbook article video with measured narration, semantic bilingual captions, and continuity-controlled scenes.
category: custom
stability: beta
default_checkpoint_policy: guided

orchestration:
  mode: executive-producer
  skill: pipelines/english-textbook/executive-producer
  budget_default_usd: 0
  max_revisions_per_stage: 3
  max_send_backs: 2
  max_wall_time_minutes: 30

extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false

required_skills:
  - pipelines/english-textbook/executive-producer
  - pipelines/english-textbook/ingest-director
  - pipelines/english-textbook/idea-director
  - pipelines/english-textbook/script-director
  - pipelines/english-textbook/narration-director
  - pipelines/english-textbook/scene-director
  - pipelines/english-textbook/asset-director
  - pipelines/english-textbook/edit-director
  - pipelines/english-textbook/compose-director
  - pipelines/english-textbook/publish-director
  - meta/reviewer
  - meta/checkpoint-protocol
  - meta/voice-performance-director

compatible_playbooks:
  recommended: [esl-cinematic-editorial]
  also_works: [clean-professional]
  custom_allowed: false

metadata:
  modes: [phase1_verification, article]
  default_mode: article
  source_policy: verbatim
  api_contract:
    provider: mixed
    region: cn-beijing
    text_model: qwen3.7-plus
    image_provider: openai_compatible_local
    image_model: flux2-klein-base-4b
    image_size: 1024x1024
    image_quality: medium
    video_model: wan2.6-i2v-flash
    tts_model: qwen3-tts-vd-2026-01-26
    asr_model: qwen3-asr-flash-filetrans
    free_tier_only: true
    paid_spend_cap: 0
    verification_duration_seconds: 10

stages:
  - name: ingest
    skill: pipelines/english-textbook/ingest-director
    produces: [lesson_source]
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Source text is non-empty and preserved verbatim
      - Only approved mechanical normalizations are applied
      - SHA-256 identifies the normalized source deterministically
    success_criteria:
      - Schema-valid lesson_source
      - No source word is added, removed, reordered, or replaced

  - name: idea
    skill: pipelines/english-textbook/idea-director
    required_artifacts_in: [lesson_source]
    produces: [brief, lesson_plan, decision_log]
    required_tools: [dashscope_text]
    tools_available: [dashscope_text]
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Audience, delivery mode, and duration policy are explicit
      - Provider models and free-tier-only policy match the approved contract
      - Runtime and composition mode are explicit and auditable
    success_criteria:
      - Schema-valid brief and lesson_plan
      - Runtime, music, and provider locks are recorded

  - name: script
    skill: pipelines/english-textbook/script-director
    required_artifacts_in: [lesson_source, lesson_plan]
    produces: [script]
    required_tools: [dashscope_text]
    tools_available: [dashscope_text]
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Narration preserves canonical source wording and order
      - Unit boundaries and protected spans are grammar-safe
      - Character ranges cover the source exactly once
    success_criteria:
      - Schema-valid script
      - Narration remains source-faithful

  - name: narration
    skill: pipelines/english-textbook/narration-director
    required_artifacts_in: [lesson_source, script]
    optional_artifacts_in: [lesson_plan]
    produces: [narration_timeline]
    required_tools: [dashscope_tts, dashscope_asr]
    optional_tools: [audio_mixer]
    tools_available: [dashscope_tts, dashscope_asr, audio_mixer]
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Voice and TTS model match the approved target
      - Actual audio duration is measured before scene timing
      - ASR timing is aligned to canonical source words
    success_criteria:
      - Schema-valid narration_timeline
      - Narration exists with aligned canonical word timings
      - Checkpoint carries the unchanged lesson_source for cross-stage source verification

  - name: scene_plan
    skill: pipelines/english-textbook/scene-director
    required_artifacts_in: [narration_timeline, lesson_plan]
    optional_artifacts_in: [script]
    produces: [scene_plan]
    required_tools: [dashscope_text]
    tools_available: [dashscope_text]
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Visual beats follow measured narration timing
      - Adjacent narrative units share a scene until context changes or the provider clip limit is reached
      - Continuity IDs and provider-neutral motion beats are explicit
      - Generated imagery contains no readable text
    success_criteria:
      - Schema-valid scene_plan
      - Every beat has a narration range and feasible tool path

  - name: assets
    skill: pipelines/english-textbook/asset-director
    required_artifacts_in: [scene_plan, narration_timeline]
    optional_artifacts_in: [lesson_source, lesson_plan, script]
    produces: [asset_manifest]
    required_tools: [local_openai_image, dashscope_video]
    tools_available: [local_openai_image, dashscope_video]
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Requests use only the locked local image model and DashScope video model
      - Visual identity and historical details remain stable
      - Wan output is real motion with generated audio disabled
    success_criteria:
      - Schema-valid asset_manifest
      - Approved 1080P motion clips cover the planned article scenes

  - name: edit
    skill: pipelines/english-textbook/edit-director
    required_artifacts_in: [asset_manifest, scene_plan, narration_timeline]
    produces: [edit_decisions]
    required_tools: [subtitle_gen]
    tools_available: [subtitle_gen]
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Canonical timings drive active-word highlighting
      - Audio and visuals fit the selected measured or fixed canvas
      - Subtitle pages follow semantic word-index ranges and planned line breaks
      - Runtime remains the approved runtime
    success_criteria:
      - Schema-valid edit_decisions
      - Captions cover the complete source passage

  - name: compose
    skill: pipelines/english-textbook/compose-director
    required_artifacts_in: [edit_decisions, asset_manifest]
    optional_artifacts_in: [narration_timeline, scene_plan, lesson_plan]
    produces: [render_report, final_review]
    required_tools: [video_compose, audio_mixer]
    tools_available: [video_compose, audio_mixer]
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Output is a 1920x1080 H.264 MP4 with narration audio
      - Measured duration is within the selected duration policy
      - Word-highlight captions are readable and synchronized
    success_criteria:
      - Schema-valid render_report and final_review
      - Output passes technical, visual, audio, and subtitle checks

  - name: publish
    skill: pipelines/english-textbook/publish-director
    required_artifacts_in: [render_report, final_review]
    optional_artifacts_in: [lesson_source, lesson_plan]
    produces: [publish_log]
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Delivery notes identify source hash and provider models
      - Verification evidence and limitations are preserved
      - Package contains no credentials or temporary URLs
    success_criteria:
      - Schema-valid publish_log
      - Package contains the verified MP4 and audit metadata
